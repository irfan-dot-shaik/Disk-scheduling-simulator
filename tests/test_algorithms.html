<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Disk Scheduling Algorithms — Unit Tests</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f23; color: #e0e0e0;
      padding: 2rem;
    }
    h1 { color: #a78bfa; margin-bottom: 0.5rem; }
    .subtitle { color: #6b7280; margin-bottom: 2rem; font-size: 0.9rem; }
    .test-suite { margin-bottom: 1.5rem; }
    .suite-name {
      font-size: 1rem; font-weight: 600; color: #8b5cf6;
      margin-bottom: 0.5rem; padding-bottom: 0.3rem;
      border-bottom: 1px solid rgba(139,92,246,0.2);
    }
    .test-case {
      padding: 0.5rem 0.75rem; margin: 0.25rem 0;
      border-radius: 6px; font-size: 0.85rem;
      font-family: 'Consolas', monospace;
    }
    .pass { background: rgba(16,185,129,0.1); border-left: 3px solid #10b981; }
    .fail { background: rgba(244,63,94,0.1); border-left: 3px solid #f43f5e; }
    .pass::before { content: "✅ "; }
    .fail::before { content: "❌ "; }
    .summary {
      margin-top: 2rem; padding: 1rem;
      background: rgba(139,92,246,0.08);
      border: 1px solid rgba(139,92,246,0.2);
      border-radius: 8px; font-size: 1rem;
    }
    .summary .count { font-weight: 700; font-family: monospace; }
    .summary .pass-text { color: #10b981; }
    .summary .fail-text { color: #f43f5e; }
  </style>
</head>
<body>
  <h1>🧪 Disk Scheduling — Unit Tests</h1>
  <p class="subtitle">Automated tests for FCFS, SSTF, SCAN, C-SCAN algorithms and metrics module</p>
  <div id="results"></div>
  <div id="summary" class="summary"></div>

  <script>
    // ── Inline algorithm implementations for testing ──
    function fcfs(requests, head) {
      const seq = [head, ...requests];
      let total = 0;
      for (let i = 1; i < seq.length; i++) total += Math.abs(seq[i] - seq[i - 1]);
      return { sequence: seq, total, name: "FCFS" };
    }

    function sstf(requests, head) {
      const pending = [...requests];
      const seq = [head];
      let total = 0, cur = head;
      while (pending.length) {
        let minDist = Infinity, minIdx = 0;
        for (let i = 0; i < pending.length; i++) {
          const d = Math.abs(pending[i] - cur);
          if (d < minDist) { minDist = d; minIdx = i; }
        }
        total += minDist;
        cur = pending[minIdx];
        seq.push(cur);
        pending.splice(minIdx, 1);
      }
      return { sequence: seq, total, name: "SSTF" };
    }

    function scan(requests, head, diskSize, direction) {
      const left = requests.filter(r => r < head).sort((a, b) => a - b);
      const right = requests.filter(r => r >= head).sort((a, b) => a - b);
      let run;
      if (direction === "right") {
        run = [...right, diskSize - 1, ...left.reverse()];
      } else {
        run = [...left.reverse(), 0, ...right];
      }
      const seq = [head];
      let total = 0, cur = head;
      for (const c of run) { total += Math.abs(c - cur); cur = c; seq.push(c); }
      return { sequence: seq, total, name: "SCAN" };
    }

    function cscan(requests, head, diskSize) {
      const left = requests.filter(r => r < head).sort((a, b) => a - b);
      const right = requests.filter(r => r >= head).sort((a, b) => a - b);
      const run = [...right, diskSize - 1, 0, ...left];
      const seq = [head];
      let total = 0, cur = head;
      for (const c of run) { total += Math.abs(c - cur); cur = c; seq.push(c); }
      return { sequence: seq, total, name: "C-SCAN" };
    }

    function computeMetrics(seq) {
      const dists = [];
      for (let i = 1; i < seq.length; i++) dists.push(Math.abs(seq[i] - seq[i - 1]));
      const total = dists.reduce((a, b) => a + b, 0);
      const avg = dists.length ? total / dists.length : 0;
      const throughput = total ? dists.length / total : 0;
      return { total, avg: avg.toFixed(2), throughput: throughput.toFixed(4) };
    }

    // ── Test framework ──
    let totalPassed = 0, totalFailed = 0;
    const resultsDiv = document.getElementById("results");

    function suite(name) {
      const div = document.createElement("div");
      div.className = "test-suite";
      div.innerHTML = `<div class="suite-name">${name}</div>`;
      resultsDiv.appendChild(div);
      return div;
    }

    function test(suiteDiv, description, condition) {
      const el = document.createElement("div");
      el.className = `test-case ${condition ? "pass" : "fail"}`;
      el.textContent = description;
      suiteDiv.appendChild(el);
      if (condition) totalPassed++; else totalFailed++;
    }

    function arraysEqual(a, b) {
      return a.length === b.length && a.every((v, i) => v === b[i]);
    }

    // ══════════════════════════════════════════════════════
    //  TEST SUITE 1: FCFS Algorithm
    // ══════════════════════════════════════════════════════
    const s1 = suite("FCFS Algorithm Tests");

    (() => {
      const r = fcfs([98, 183, 37, 122, 14, 124, 65, 67], 53);
      test(s1, `Total seek time = 640 (got ${r.total})`, r.total === 640);
      test(s1, `Sequence starts with head position 53`, r.sequence[0] === 53);
      test(s1, `Sequence length = 9 (head + 8 requests)`, r.sequence.length === 9);
      test(s1, `Requests served in arrival order`, arraysEqual(r.sequence, [53, 98, 183, 37, 122, 14, 124, 65, 67]));
      test(s1, `Algorithm name = "FCFS"`, r.name === "FCFS");
    })();

    (() => {
      const r = fcfs([10], 50);
      test(s1, `Single request: total = 40 (got ${r.total})`, r.total === 40);
    })();

    (() => {
      const r = fcfs([50], 50);
      test(s1, `Request at head position: total = 0`, r.total === 0);
    })();

    // ══════════════════════════════════════════════════════
    //  TEST SUITE 2: SSTF Algorithm
    // ══════════════════════════════════════════════════════
    const s2 = suite("SSTF Algorithm Tests");

    (() => {
      const r = sstf([98, 183, 37, 122, 14, 124, 65, 67], 53);
      test(s2, `Total seek time = 236 (got ${r.total})`, r.total === 236);
      test(s2, `Sequence starts with head 53`, r.sequence[0] === 53);
      test(s2, `First move goes to nearest (65)`, r.sequence[1] === 65);
      test(s2, `Sequence length = 9`, r.sequence.length === 9);
      test(s2, `Algorithm name = "SSTF"`, r.name === "SSTF");
    })();

    (() => {
      const r = sstf([10, 20, 30], 15);
      test(s2, `Nearest first: starts with 10 or 20`, r.sequence[1] === 10 || r.sequence[1] === 20);
      test(s2, `All requests served`, r.sequence.length === 4);
    })();

    // ══════════════════════════════════════════════════════
    //  TEST SUITE 3: SCAN Algorithm
    // ══════════════════════════════════════════════════════
    const s3 = suite("SCAN Algorithm Tests");

    (() => {
      const r = scan([98, 183, 37, 122, 14, 124, 65, 67], 53, 200, "right");
      test(s3, `SCAN right: total seek time = 331 (got ${r.total})`, r.total === 331);
      test(s3, `Sequence starts with 53`, r.sequence[0] === 53);
      test(s3, `Hits disk boundary 199`, r.sequence.includes(199));
      test(s3, `Algorithm name = "SCAN"`, r.name === "SCAN");
    })();

    (() => {
      const r = scan([98, 183, 37, 122, 14, 124, 65, 67], 53, 200, "left");
      test(s3, `SCAN left: hits boundary 0`, r.sequence.includes(0));
      test(s3, `SCAN left: sequence starts with 53`, r.sequence[0] === 53);
    })();

    (() => {
      const r = scan([], 53, 200, "right");
      test(s3, `Empty requests: only head + boundary in sequence`, r.sequence.length === 2);
    })();

    // ══════════════════════════════════════════════════════
    //  TEST SUITE 4: C-SCAN Algorithm
    // ══════════════════════════════════════════════════════
    const s4 = suite("C-SCAN Algorithm Tests");

    (() => {
      const r = cscan([98, 183, 37, 122, 14, 124, 65, 67], 53, 200);
      test(s4, `C-SCAN: total seek time = 389 (got ${r.total})`, r.total === 389);
      test(s4, `Sequence starts with 53`, r.sequence[0] === 53);
      test(s4, `Hits boundary 199 before wrapping`, r.sequence.includes(199));
      test(s4, `Wraps through 0`, r.sequence.includes(0));
      test(s4, `Algorithm name = "C-SCAN"`, r.name === "C-SCAN");
    })();

    (() => {
      const r = cscan([10, 20, 180, 190], 100, 200);
      const idx199 = r.sequence.indexOf(199);
      const idx0 = r.sequence.indexOf(0);
      test(s4, `boundary 199 comes before 0 (circular wrap)`, idx199 < idx0);
    })();

    // ══════════════════════════════════════════════════════
    //  TEST SUITE 5: Metrics Module
    // ══════════════════════════════════════════════════════
    const s5 = suite("Performance Metrics Tests");

    (() => {
      const m = computeMetrics([53, 98, 183, 37, 122, 14, 124, 65, 67]);
      test(s5, `FCFS metrics: total = 640 (got ${m.total})`, m.total === 640);
      test(s5, `FCFS metrics: avg = "80.00" (got ${m.avg})`, m.avg === "80.00");
      test(s5, `FCFS metrics: throughput is a string`, typeof m.throughput === "string");
      test(s5, `Throughput > 0`, parseFloat(m.throughput) > 0);
    })();

    (() => {
      const m = computeMetrics([50, 50]);
      test(s5, `Same position: total = 0`, m.total === 0);
      test(s5, `Same position: avg = "0.00"`, m.avg === "0.00");
    })();

    // ══════════════════════════════════════════════════════
    //  TEST SUITE 6: Algorithm Comparison
    // ══════════════════════════════════════════════════════
    const s6 = suite("Algorithm Comparison Tests");

    (() => {
      const requests = [98, 183, 37, 122, 14, 124, 65, 67];
      const head = 53;
      const f = fcfs(requests, head);
      const st = sstf(requests, head);
      const sc = scan(requests, head, 200, "right");
      const cs = cscan(requests, head, 200);

      test(s6, `SSTF produces lowest seek time`, st.total <= f.total && st.total <= sc.total && st.total <= cs.total);
      test(s6, `FCFS produces highest seek time for this input`, f.total >= st.total && f.total >= sc.total && f.total >= cs.total);
      test(s6, `All algorithms produce valid sequences (length = 9 or more)`,
        f.sequence.length >= 9 && st.sequence.length === 9 && sc.sequence.length >= 9 && cs.sequence.length >= 9);
      test(s6, `All algorithms start at head position 53`,
        f.sequence[0] === 53 && st.sequence[0] === 53 && sc.sequence[0] === 53 && cs.sequence[0] === 53);
    })();

    // ── Summary ──
    const summaryDiv = document.getElementById("summary");
    summaryDiv.innerHTML = `
      <span class="count pass-text">${totalPassed} passed</span> &nbsp;|&nbsp;
      <span class="count fail-text">${totalFailed} failed</span> &nbsp;|&nbsp;
      <span class="count">${totalPassed + totalFailed} total</span>
      ${totalFailed === 0 ? ' &nbsp;— &nbsp;🎉 All tests passed!' : ''}
    `;
  </script>
</body>
</html>
